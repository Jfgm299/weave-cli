name: pr-metadata-coherence

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

jobs:
  enforce-pr-metadata-coherence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate checklist-label-issue coherence
        run: |
          python3 scripts/ci/check_pr_metadata_coherence.py --from-file "$GITHUB_EVENT_PATH"

      - name: Emit workflow evidence payload
        if: ${{ always() }}
        env:
          EVIDENCE_STATUS: ${{ job.status }}
        run: |
          python3 scripts/ci/collect_workflow_evidence.py \
            --workflow-name pr-metadata-coherence \
            --status "$EVIDENCE_STATUS" \
            --output ci-evidence/pr-metadata-coherence.json

      - name: Upload workflow evidence artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-pr-metadata-coherence
          path: ci-evidence/pr-metadata-coherence.json
