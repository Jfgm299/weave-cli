name: repo-hygiene-gate

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/repo-hygiene-gate.yml'
      - '.gitignore'
  push:
    branches:
      - main

jobs:
  enforce-repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tracked python cache artifacts are absent
        run: |
          python3 scripts/ci/check_repo_hygiene.py

      - name: Emit workflow evidence payload
        if: ${{ always() }}
        env:
          EVIDENCE_STATUS: ${{ job.status }}
        run: |
          python3 scripts/ci/collect_workflow_evidence.py \
            --workflow-name repo-hygiene-gate \
            --status "$EVIDENCE_STATUS" \
            --output ci-evidence/repo-hygiene-gate.json

      - name: Upload workflow evidence artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ci-evidence-repo-hygiene-gate
          path: ci-evidence/repo-hygiene-gate.json
